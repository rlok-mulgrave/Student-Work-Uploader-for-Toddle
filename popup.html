<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 15px; font-family: sans-serif; text-align: center; }
    
    .button-primary { 
      width: 100%; padding: 10px; cursor: pointer; 
      background-color: #007bff; color: white; 
      border: none; border-radius: 4px; font-weight: bold; margin-bottom: 5px;
    }
    .button-primary:hover { background-color: #0056b3; }

    p { font-size: 12px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Student Work Uploader</h3>
  
  <button id="runBtn" class="button-primary">Run Now (U)</button>

  <p>Drag & Drop a file onto a student's name to auto-upload.</p>

  <script src="popup.js"></script>
</body>
</html>
